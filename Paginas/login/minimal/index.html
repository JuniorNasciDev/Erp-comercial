<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="minimal.doc_title">ERP-Nasci Login</title>
    <meta
      name="description"
      content="Login ERP-Nasci"
    />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/shared/tokens.css" />
    <link rel="stylesheet" href="../css/shared/base.css" />
    <link rel="stylesheet" href="../css/shared/forms-floating.css" />
    <link rel="stylesheet" href="../css/shared/icons.css" />
    <link rel="stylesheet" href="../css/shared/dir-bar.css" />
    <link rel="stylesheet" href="../css/shared/credit.css" />
    <link rel="stylesheet" href="css/00-variables.css" />
    <link rel="stylesheet" href="css/01-layout.css" />
    <link rel="stylesheet" href="css/02-panel.css" />
    <link rel="stylesheet" href="css/03-form.css" />
  </head>
  <body class="theme-minimal has-dir-bar">  

    <div class="mn-gradient" aria-hidden="true"></div>
    <div class="mn-noise" aria-hidden="true"></div>

  

    <main class="shell">
      <section class="panel" aria-labelledby="mn-title">
        <div class="panel__icon" style="margin: auto; align-items: center;">
          <span style="opacity: 0;">
            Você consegue!!!
          </span>
        </div>
        <header class="panel__head">
          <p class="panel__eyebrow" data-i18n="minimal.eyebrow"> Seja bem vindo Ao Sistema</p>
          <h1 id="mn-title" class="panel__title" data-i18n="minimal.title">Login</h1>
          <p class="panel__sub" data-i18n="minimal.sub">
            por favor efetue o Login Com seu email e senha.
          </p>
        </header>

        <form class="form" data-auth-form novalidate>
          <div class="form__banner" data-form-message hidden role="presentation"></div>

          <div class="field field--float">
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder=" "
              required
            />
            <label for="email" data-i18n="common.email">E-mail</label>
          </div>

          <div class="field field--float">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder=" "
              required
              minlength="8"
            />
            <label for="password" data-i18n="common.password">Senha</label>
          </div>

          <div class="row">
            <label class="check">
              <input type="checkbox" name="remember" />
              <span class="check__ui" aria-hidden="true"></span>
              <span data-i18n="minimal.remember">Lembrar de mim</span>
            </label>
            <a class="link" href="../minimalSenha/minimal/index.html" data-i18n="minimal.link_help">Esqueci minha senha</a>
          </div>

          <button type="submit" class="btn" data-magnetic data-i18n="minimal.submit">Entrar</button>
        </form>

        <footer class="theme-credit">
          <span data-i18n="common.credit">Desenvolvido por juniorNasci</span>
          <a
            href="https://www.linkedin.com/in/mohammad-abu-sakour-kn/"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="common.credit_link"
            >LinkedIn</a
          >
        </footer>
      </section>
    </main>

    <script src="../js/shared/dir-toggle.js" defer></script>
    <script src="../js/shared/i18n-locale.js" defer></script>
    <script src="../js/shared/auth-form.js" defer></script>
    <script src="../js/shared/magnetic-btn.js" defer></script>
    <script src="../js/shared/icon-interactions.js" defer></script>
  </body>
</html>
