<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas a Pagar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Contas a Pagar</h1>
                <p>Gestão de despesas e saídas de caixa</p>
            </div>
        </header>

        <div class="summary-totais" style="margin-bottom: 2rem;">
            <div class="totais-item">
                <span>Total Pendente</span>
                <strong id="total-pendente" style="color: var(--danger);">R$ 0,00</strong>
            </div>
            <div class="totais-item">
                <span>Total Pago</span>
                <strong id="total-pago" style="color: var(--success);">R$ 0,00</strong>
            </div>
        </div>

        <div class="form-card" style="margin-bottom: 2rem;">
            <h2 class="section-title">Registrar Nova Conta</h2>
            <form id="form-conta">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Conta de Luz..." required>
                    </div>
                    <div class="form-group">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="vencimento">Vencimento</label>
                        <input type="date" id="vencimento" required>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="reset" class="btn-cancelar">Limpar</button>
                    <button type="submit" class="btn-salvar">Adicionar Conta</button>
                </div>
            </form>
        </div>

        <div class="form-card">
            <h2 class="section-title">Lista de Contas</h2>
            <div class="table-container">
                <table id="tabela-contas">
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th>Vencimento</th>
                            <th>Status</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-contas"></tbody>
                </table>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
